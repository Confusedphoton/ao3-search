<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a0404"/>
      <stop offset="100%" stop-color="#1c0202"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- tier 1 fan-out: gold bleeding from path nodes into the maze, now reaching further -->
    <linearGradient id="fan1" gradientUnits="userSpaceOnUse" x1="20" y1="22" x2="54" y2="14">
      <stop offset="0%" stop-color="#f4c65a" stop-opacity="0.8"/>
      <stop offset="55%" stop-color="#f4c65a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f4c65a" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="fan2" gradientUnits="userSpaceOnUse" x1="32" y1="52" x2="64" y2="48">
      <stop offset="0%" stop-color="#f4c65a" stop-opacity="0.8"/>
      <stop offset="55%" stop-color="#f4c65a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f4c65a" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="fan3" gradientUnits="userSpaceOnUse" x1="32" y1="52" x2="16" y2="86">
      <stop offset="0%" stop-color="#f4c65a" stop-opacity="0.8"/>
      <stop offset="55%" stop-color="#f4c65a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f4c65a" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="fan4" gradientUnits="userSpaceOnUse" x1="48" y1="82" x2="16" y2="86">
      <stop offset="0%" stop-color="#f4c65a" stop-opacity="0.8"/>
      <stop offset="55%" stop-color="#f4c65a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f4c65a" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="fan5" gradientUnits="userSpaceOnUse" x1="48" y1="82" x2="64" y2="48">
      <stop offset="0%" stop-color="#f4c65a" stop-opacity="0.8"/>
      <stop offset="55%" stop-color="#f4c65a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f4c65a" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="fan6" gradientUnits="userSpaceOnUse" x1="78" y1="92" x2="96" y2="68">
      <stop offset="0%" stop-color="#f4c65a" stop-opacity="0.8"/>
      <stop offset="55%" stop-color="#f4c65a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f4c65a" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="fan7" gradientUnits="userSpaceOnUse" x1="58" y1="112" x2="85" y2="114">
      <stop offset="0%" stop-color="#f4c65a" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#f4c65a" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="fan8" gradientUnits="userSpaceOnUse" x1="112" y1="116" x2="85" y2="114">
      <stop offset="0%" stop-color="#f4c65a" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#f4c65a" stop-opacity="0.25"/>
    </linearGradient>

    <!-- tier 2 fan-out: a fainter second wave of gold, spreading one hop further into the maze -->
    <linearGradient id="fan9" gradientUnits="userSpaceOnUse" x1="54" y1="14" x2="92" y2="24">
      <stop offset="0%" stop-color="#f4c65a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#f4c65a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fan10" gradientUnits="userSpaceOnUse" x1="54" y1="14" x2="64" y2="48">
      <stop offset="0%" stop-color="#f4c65a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#f4c65a" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="fan11" gradientUnits="userSpaceOnUse" x1="96" y1="68" x2="110" y2="50">
      <stop offset="0%" stop-color="#f4c65a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#f4c65a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fan12" gradientUnits="userSpaceOnUse" x1="64" y1="48" x2="96" y2="68">
      <stop offset="0%" stop-color="#f4c65a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f4c65a" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="128" height="128" rx="26" fill="url(#bgGrad)"/>

  <!-- decoy / wall edges of the labyrinth (muted red, unresolved paths) -->
  <g stroke="#a83232" stroke-width="1.4" stroke-linecap="round" opacity="0.5">
    <line x1="20" y1="22" x2="54" y2="14"/>
    <line x1="54" y1="14" x2="92" y2="24"/>
    <line x1="92" y1="24" x2="110" y2="50"/>
    <line x1="54" y1="14" x2="64" y2="48"/>
    <line x1="110" y1="50" x2="96" y2="68"/>
    <line x1="64" y1="48" x2="96" y2="68"/>
    <line x1="32" y1="52" x2="64" y2="48"/>
    <line x1="32" y1="52" x2="16" y2="86"/>
    <line x1="16" y1="86" x2="48" y2="82"/>
    <line x1="48" y1="82" x2="64" y2="48"/>
    <line x1="96" y1="68" x2="78" y2="92"/>
    <line x1="58" y1="112" x2="112" y2="116"/>
  </g>

  <!-- tier 2 gold diffusion: a second, fainter wave spreading further out into the maze -->
  <g stroke-linecap="round">
    <line x1="54" y1="14" x2="92" y2="24" stroke="url(#fan9)" stroke-width="1.3"/>
    <line x1="54" y1="14" x2="64" y2="48" stroke="url(#fan10)" stroke-width="1.3"/>
    <line x1="96" y1="68" x2="110" y2="50" stroke="url(#fan11)" stroke-width="1.3"/>
    <line x1="64" y1="48" x2="96" y2="68" stroke="url(#fan12)" stroke-width="1.3"/>
  </g>

  <!-- tier 1 gold diffusion: strongest bleed, closest to the dominant thread -->
  <g stroke-linecap="round">
    <line x1="20" y1="22" x2="54" y2="14" stroke="url(#fan1)" stroke-width="1.8"/>
    <line x1="32" y1="52" x2="64" y2="48" stroke="url(#fan2)" stroke-width="1.8"/>
    <line x1="32" y1="52" x2="16" y2="86" stroke="url(#fan3)" stroke-width="1.8"/>
    <line x1="48" y1="82" x2="16" y2="86" stroke="url(#fan4)" stroke-width="1.8"/>
    <line x1="48" y1="82" x2="64" y2="48" stroke="url(#fan5)" stroke-width="1.8"/>
    <line x1="78" y1="92" x2="96" y2="68" stroke="url(#fan6)" stroke-width="1.8"/>
    <line x1="58" y1="112" x2="85" y2="114" stroke="url(#fan7)" stroke-width="1.8"/>
    <line x1="112" y1="116" x2="85" y2="114" stroke="url(#fan8)" stroke-width="1.8"/>
  </g>

  <!-- decoy nodes -->
  <g fill="#c24949">
    <circle cx="54" cy="14" r="2.6"/>
    <circle cx="92" cy="24" r="2.6"/>
    <circle cx="110" cy="50" r="2.6"/>
    <circle cx="64" cy="48" r="2.6"/>
    <circle cx="96" cy="68" r="2.6"/>
    <circle cx="16" cy="86" r="2.6"/>
    <circle cx="48" cy="82" r="2.6"/>
  </g>

  <!-- the chosen thread: Theseus' path through the maze -->
  <g filter="url(#softGlow)">
    <polyline points="20,22 32,52 48,82 58,112 78,92 102,104 112,116"
      fill="none" stroke="#e8b74a" stroke-width="2.6"
      stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- faint trailing thread, doubled line for a "spun thread" feel -->
  <polyline points="20,22 32,52 48,82 58,112 78,92 102,104 112,116"
    fill="none" stroke="#f6d78a" stroke-width="0.7"
    stroke-linecap="round" stroke-linejoin="round"
    stroke-dasharray="1 4" opacity="0.85"/>

  <!-- nodes along the golden path -->
  <g fill="#f4c65a" stroke="#7a1f1f" stroke-width="1">
    <circle cx="32" cy="52" r="3.2"/>
    <circle cx="48" cy="82" r="3.2"/>
    <circle cx="58" cy="112" r="3.2"/>
    <circle cx="78" cy="92" r="3.2"/>
    <circle cx="102" cy="104" r="3.2"/>
  </g>

  <!-- entrance node: small spool motif, nod to Theseus' ball of thread -->
  <circle cx="20" cy="22" r="5" fill="none" stroke="#f4c65a" stroke-width="1.1"/>
  <circle cx="20" cy="22" r="2.4" fill="#f4c65a"/>

  <!-- exit node: the heart of the labyrinth -->
  <circle cx="112" cy="116" r="4.6" fill="#fff3d6" stroke="#e8b74a" stroke-width="1.4"/>
</svg>
